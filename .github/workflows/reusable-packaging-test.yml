name: Packaging Tests

on:
  workflow_call:

  workflow_dispatch:


concurrency:
  group: packaging-test-${{ github.head_ref }}
  cancel-in-progress: true

env:
  SOURCE_DATE_EPOCH: "1668811211"

jobs:
  build_awkward_sdist_wheel:
    name: "Build awkward"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: true
        persist-credentials: false

    - name: Prepare build files
      run: pipx run nox -s prepare

    - name: Build awkward SDist & wheel
      run: pipx run build

    - name: Check metadata
      run: pipx run twine check dist/*

    - name: Build awkward-cpp SDist
      run: pipx run build --sdist awkward-cpp

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: awkward-sdist
        path: dist/*.tar.gz

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: awkward-wheel
        path: dist/*.whl

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: awkward-cpp-sdist
        path: awkward-cpp/dist/*.tar.gz


  build_cpp_wheels:
    name: "Build awkward-cpp: ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-11-arm, windows-latest, macos-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: true
        persist-credentials: false

    - name: Setup uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

    - name: Prepare build files
      run: pipx run nox -s prepare

    - uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
      env:
        CIBW_ARCHS_MACOS: universal2
        CIBW_ARCHS_WINDOWS: auto64
        CIBW_BUILD: cp311-win_* cp310-macosx_universal2 cp310-manylinux_x86_64 cp312-manylinux_x86_64
      with:
        package-dir: awkward-cpp

    - name: Upload wheels
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: awkward-cpp-wheels-${{ matrix.os }}
        path: wheelhouse/*.whl
