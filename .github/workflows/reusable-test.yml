name: Tests

on:
  schedule:
    - cron: 0 12 1 * *

  workflow_call:
    inputs:
      run-gpu-kernel-tests:
        description: Run the gpu kernel tests
        required: false
        default: false
        type: string # The workflow freezes if this is set to boolean for some reason

  workflow_dispatch:
    inputs:
      run-gpu-kernel-tests:
        description: Run the gpu kernel tests
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: 'test-${{ github.head_ref || github.run_id }}'
  cancel-in-progress: true

env:
  # Leverage reproducible builds by setting a constant SOURCE_DATE_EPOCH
  # This will ensure that the hash of the awkward-cpp directory remains
  # constant for unchanged files, meaning that it can be used for caching
  SOURCE_DATE_EPOCH: "1668811211"

jobs:
  run-tests:
    name: Run Tests
    if: github.event_name != 'schedule' || github.repository_owner == 'scikit-hep'
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - windows-latest
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
        python-version:
          - '3.14'
          - '3.10'
        python-architecture:
          - '' # use default arch
        dependencies-kind:
          - full
        include:
          - python-version: '3.14'
            python-architecture: arm64
            runs-on: macos-14
            dependencies-kind: full
          - python-version: '3.14'
            python-architecture: x64
            runs-on: macos-15-intel
            dependencies-kind: basic
          - python-version: '3.10'
            python-architecture: x86
            runs-on: windows-latest
            dependencies-kind: full
          - python-version: '3.10'
            python-architecture: x86
            runs-on: windows-latest
            dependencies-kind: numpy1
          - python-version: '3.10'
            python-architecture: x64
            runs-on: ubuntu-latest
            dependencies-kind: minimal
          - python-version: '3.11'
            python-architecture: arm64
            runs-on: macos-14
            dependencies-kind: ml
          - python-version: '3.14t'
            python-architecture: x64
            runs-on: ubuntu-latest
            dependencies-kind: nogil
          - python-version: '3.14t'
            python-architecture: arm64
            runs-on: macos-14
            dependencies-kind: nogil
          - python-version: '3.14t'
            python-architecture: x64
            runs-on: windows-latest
            dependencies-kind: nogil

    runs-on: ${{ matrix.runs-on }}

    env:
      PIP_ONLY_BINARY: numpy,pandas,pyarrow,numexpr,numexpr

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
          persist-credentials: false

      - name: 'Python ${{ matrix.python-version }}'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '${{ matrix.python-version }}'
          architecture: '${{ matrix.python-architecture }}'
          allow-prereleases: true

      - name: Generate build files
        run: pipx run nox -s prepare -- --headers --signatures --tests

      - name: Cache awkward-cpp wheel
        id: cache-awkward-cpp-wheel
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: awkward-cpp/dist
          key: ${{ github.job }}-${{ matrix.runs-on }}-${{ matrix.python-version }}-${{ matrix.python-architecture }}-${{ hashFiles('awkward-cpp/**') }}

      - name: Build awkward-cpp wheel
        if: steps.cache-awkward-cpp-wheel.outputs.cache-hit != 'true'
        run: |
          python -m pip install build
          python -m build -w awkward-cpp

      - name: Find built wheel
        uses: tj-actions/glob@2deae40528141fc53131606d56b4e4ce2a486b29 # v22.0.2
        id: find-wheel
        with:
          files: |
            awkward-cpp/dist/*.whl

      - name: Add workaround for 3.13 + cramjam
        if: matrix.python-version == '3.13'
        run: echo 'PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1' >> $GITHUB_ENV
        shell: bash

      - name: Install awkward, awkward-cpp, and dependencies
        run: >-
          python -m pip install -v . ${STEPS_FIND_WHEEL_OUTPUTS_PATHS} pytest-github-actions-annotate-failures
          -r "requirements-test-${MATRIX_DEPENDENCIES_KIND}.txt"
        shell: bash
        env:
          STEPS_FIND_WHEEL_OUTPUTS_PATHS: ${{ steps.find-wheel.outputs.paths }}
          MATRIX_DEPENDENCIES_KIND: ${{ matrix.dependencies-kind }}

      - name: Print versions
        run: python -m pip list

      - name: Check if kernel specification is sorted
        # We don't need to run this all the time
        if: (matrix.python-version == '3.12') && (matrix.runs-on == 'ubuntu-latest')
        run: pipx run nox -s diagnostics -- --check-spec-sorted

      - name: Test specification
        run: python -m pytest -vv -rs awkward-cpp/tests-spec

      - name: Test specification with explicitly defined values
        run: python -m pytest -vv -rs awkward-cpp/tests-spec-explicit

      - name: Test CPU kernels
        run: python -m pytest -vv -rs awkward-cpp/tests-cpu-kernels

      - name: Test CPU kernels with explicitly defined values
        run: python -m pytest -vv -rs awkward-cpp/tests-cpu-kernels-explicit

      - name: Test non-kernels (Python)
        run: >-
          python -m pytest -vv -rs tests

      - name: Test non-kernels (Python) in multiple threads
        if: matrix.python-version == '3.14t'
        run: |
          python -m pip install 'pytest-run-parallel>=0.8.2'
          python -m pytest -vv -rs tests --parallel-threads 4 --ignore=tests/test_3364_virtualarray.py --ignore=tests/test_3451_virtualarray_with_jax.py --ignore=tests/test_3475_virtualarray_unknown_length.py

  run-gpu-tests:
    name: Run GPU Tests
    if: github.event_name != 'schedule' || github.repository_owner == 'scikit-hep'

    runs-on: self-hosted

    env:
      PIP_ONLY_BINARY: numpy,pandas,pyarrow,numexpr,numexpr

    # Required for miniconda to activate conda
    defaults:
      run:
        shell: bash -l {0}

    strategy:
      fail-fast: false
      matrix:
        cuda-version:
          - 12
          - 13

    steps:
      - name: Clean the workspace and mamba
        run: |
          rm -rf * .[!.]* || echo "Nothing to clean"
          rm -rf ~/micromamba* || echo "Nothing to clean"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
          persist-credentials: false

      - name: Set up GPU test environment
        uses: ./.github/actions/setup-gpu-env
        with:
          cuda-version: ${{ matrix.cuda-version }}

      - name: Test CUDA kernels
        if: ${{ fromJSON(inputs.run-gpu-kernel-tests) }}
        run: python -m pytest -vv -rs tests-cuda-kernels

      - name: Test CUDA kernels with explicitly defined values
        if: ${{ fromJSON(inputs.run-gpu-kernel-tests) }}
        run: python -m pytest -vv -rs tests-cuda-kernels-explicit

      - name: Test kernel property-based tests
        if: ${{ fromJSON(inputs.run-gpu-kernel-tests) }}
        run: python -m pytest -vv -rs tests/properties -m cuda

      - name: Test CUDA non-kernel (Python)
        run: >-
          python -m pytest -vv -rs tests-cuda --ignore=tests-cuda/test_3459_virtualarray_with_cuda.py

      - name: Test CUDA virtual arrays
        run: >-
          python -m pytest -vv -rs tests-cuda/test_3459_virtualarray_with_cuda.py

  Linux-ROOT:
    name: Linux ROOT
    if: github.event_name != 'schedule' || github.repository_owner == 'scikit-hep'
    runs-on: ubuntu-latest

    env:
      PIP_ONLY_BINARY: numpy,pandas,pyarrow,numexpr,numexpr

    timeout-minutes: 30

    # Required for miniconda to activate conda
    defaults:
      run:
        shell: "bash -l {0}"

    steps:
      - uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6.0.3
        with:
          submodules: true
          persist-credentials: false

      - name: Setup Python via Conda
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          # Cache invalidates daily by default
          cache-environment: true
          environment-name: awkward
          create-args: >-
            python=3.14
            numpy
            root=6.36.06

      - name: Generate build files
        run: pipx run nox -s prepare -- --headers --signatures --tests

      - name: Cache awkward-cpp wheel
        id: cache-awkward-cpp-wheel
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ./awkward-cpp/dist
          key: ${{ github.job }}-${{ hashFiles('awkward-cpp/**') }}-py3.14

      - name: Build awkward-cpp wheel
        if: steps.cache-awkward-cpp-wheel.outputs.cache-hit != 'true'
        run: |
          python3 -m pip install build
          python3 -m build -w ./awkward-cpp

      - name: Install awkward, awkward-cpp, and dependencies
        run: >-
          python -m pip install --only-binary "numpy,pandas,pyarrow,numexpr"
          -v . ./awkward-cpp/dist/*.whl
          pytest-github-actions-annotate-failures
          -r requirements-test-full.txt

      - name: Print versions
        run: python -m pip list

      - name: Test
        run: python -m pytest -vv -rs tests

  Linux-cppyy:
    name: Linux cppyy
    if: github.event_name != 'schedule' || github.repository_owner == 'scikit-hep'
    # TODO: remove this part of the workflow
    # cppyy is not yet released. Let's load some pre-built wheels via docker (as a binary store)
    runs-on: ubuntu-22.04

    env:
      PIP_ONLY_BINARY: numpy,pandas,pyarrow,numexpr,numexpr

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
          persist-credentials: false

      - name: 'Python ${{ matrix.python-version }}'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Generate build files
        run: pipx run nox -s prepare -- --headers --signatures --tests

      - name: Cache awkward-cpp wheel
        id: cache-awkward-cpp-wheel
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ./awkward-cpp/dist
          key: ${{ github.job }}-${{ hashFiles('awkward-cpp/**') }}

      - name: Build awkward-cpp wheel
        if: steps.cache-awkward-cpp-wheel.outputs.cache-hit != 'true'
        run: |
          python -m pip install build
          python -m build -w ./awkward-cpp

      - name: Extract pre-built manylinux cppyy wheels
        uses: shrink/actions-docker-extract@f1ef61065b78731fe3310b4e84e511f6a927a77e # v4.0.0
        with:
          image: "docker.io/agoose77/cppyy-wheels:cp311"
          path: "/wheels/."
          destination: "/tmp/wheelhouse"

      - name: Install awkward, awkward-cpp, and dependencies
        run: >-
          python -m pip install -v --only-binary "numpy,pandas,pyarrow,numexpr"
          ./ ./awkward-cpp/dist/*.whl /tmp/wheelhouse/* pytest-github-actions-annotate-failures

      - name: Print versions
        run: python -m pip list

      - name: Test
        run: python -m pytest -vv -rs tests -k cppyy


  run-s390x-tests:
    # Only workflow_dispatch is enabled on forks.
    if: github.repository_owner == 'scikit-hep' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    env:
      DOCKER_CONTAINER: s390x/ubuntu:24.04
      ARCH: s390x
      TERM: xterm-256color

    name: "Run s390x Tests"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
          persist-credentials: false

      - name: Initialize binfmt_misc for qemu-user-static
        run: |
          docker run --rm --privileged tonistiigi/binfmt:qemu-v9.2.2-52 --install s390x

      - name: Cache docker container
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: container-cache
        with:
          path: ~/docker_s390x
          key: container-${{ runner.os }}-s390x-${{ hashFiles('requirements-test-basic.txt', 'awkward-cpp/pyproject.toml') }}

      - name: Create container
        if: steps.container-cache.outputs.cache-hit != 'true'
        run: |
          docker run --platform=linux/${ARCH} --name the_container --interactive \
            -v $(pwd):/awkward ${DOCKER_CONTAINER} /bin/bash -c "
            apt update &&
            apt install -y cmake build-essential gfortran git curl ca-certificates \
                           libopenblas-dev liblapack-dev pkg-config &&
            curl -LsSf https://astral.sh/uv/install.sh | sh &&
            export PATH=\"/root/.local/bin:\$PATH\" &&
            uv venv --seed --python 3.13 .venv &&
            source .venv/bin/activate &&
            uv pip install -v numpy &&
            uv pip install -r /awkward/requirements-test-basic.txt
          "
          docker commit the_container the_container
          mkdir -p ~/docker_s390x
          docker save -o ~/docker_s390x/the_container.tar the_container

      - name: Load container from cache
        if: steps.container-cache.outputs.cache-hit == 'true'
        run: docker load -i ~/docker_s390x/the_container.tar

      - name: Generate build files
        run: pipx run nox -s prepare -- --headers --signatures --tests

      - name: Cache awkward-cpp wheel
        id: cache-awkward-cpp-wheel
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: awkward-cpp/dist
          key: ${{ github.job }}-${{ hashFiles('awkward-cpp/**') }}

      - name: Build awkward-cpp wheel
        if: steps.cache-awkward-cpp-wheel.outputs.cache-hit != 'true'
        run: |
          docker run --rm --platform=linux/${ARCH} -e "TERM=${TERM}" \
            -v $(pwd):/awkward the_container \
            /bin/bash -c '
              export PATH="/root/.local/bin:$PATH" &&
              source .venv/bin/activate &&
              cd /awkward &&
              uv pip install build &&
              python -m build -w awkward-cpp
            '

      - name: Find built wheel
        uses: tj-actions/glob@2deae40528141fc53131606d56b4e4ce2a486b29 # v22.0.2
        id: find-wheel
        with:
          files: |
            awkward-cpp/dist/*.whl

      - name: Install awkward, awkward-cpp, and dependencies
        run: |
          docker run --platform=linux/${ARCH} -e "TERM=${TERM}" \
            -e STEPS_FIND_WHEEL_OUTPUTS_PATHS \
            --name build_container \
            -v $(pwd):/awkward the_container \
            /bin/bash -c '
              export PATH="/root/.local/bin:$PATH" &&
              source .venv/bin/activate &&
              cd /awkward &&
              uv pip install -v . ${STEPS_FIND_WHEEL_OUTPUTS_PATHS} pytest-github-actions-annotate-failures
            '
          docker commit build_container the_container
          docker rm build_container
        env:
          STEPS_FIND_WHEEL_OUTPUTS_PATHS: ${{ steps.find-wheel.outputs.paths }}

      - name: Print versions
        run: |
          docker run --rm --platform=linux/${ARCH} \
            -v $(pwd):/awkward the_container \
            /bin/bash -c '
              export PATH="/root/.local/bin:$PATH" &&
              source .venv/bin/activate &&
              python -c "import sys; print(sys.byteorder)" &&
              uv pip list
            '

      - name: Test specification
        run: |
          docker run --rm --platform=linux/${ARCH} -e "TERM=${TERM}" \
            -v $(pwd):/awkward the_container \
            /bin/bash -c '
              source .venv/bin/activate && cd /awkward &&
              python -m pytest -vv -rs awkward-cpp/tests-spec
            '

      - name: Test specification with explicitly defined values
        run: |
          docker run --rm --platform=linux/${ARCH} -e "TERM=${TERM}" \
            -v $(pwd):/awkward the_container \
            /bin/bash -c '
              source .venv/bin/activate && cd /awkward &&
              python -m pytest -vv -rs awkward-cpp/tests-spec-explicit
            '

      - name: Test CPU kernels
        run: |
          docker run --rm --platform=linux/${ARCH} -e "TERM=${TERM}" \
            -v $(pwd):/awkward the_container \
            /bin/bash -c '
              source .venv/bin/activate && cd /awkward &&
              python -m pytest -vv -rs awkward-cpp/tests-cpu-kernels
            '

      - name: Test CPU kernels with explicitly defined values
        run: |
          docker run --rm --platform=linux/${ARCH} -e "TERM=${TERM}" \
            -v $(pwd):/awkward the_container \
            /bin/bash -c '
              source .venv/bin/activate && cd /awkward &&
              python -m pytest -vv -rs awkward-cpp/tests-cpu-kernels-explicit
            '

      - name: Test non-kernels (Python)
        run: |
          docker run --rm --platform=linux/${ARCH} -e "TERM=${TERM}" \
            -v $(pwd):/awkward the_container \
            /bin/bash -c '
              source .venv/bin/activate && cd /awkward &&
              python -m pytest -vv -rs tests
            '
